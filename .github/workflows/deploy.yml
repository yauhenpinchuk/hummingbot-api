name: Build and Deploy — Hummingbot API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  scan-secrets:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.sha }}
          head: HEAD
          extra_args: --only-verified

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [scan-secrets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hummingbot-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hummingbot-api:latest
            ghcr.io/${{ github.repository_owner }}/hummingbot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/hummingbot-stack/hummingbot-api

            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export HUMMINGBOT_API_IMAGE=ghcr.io/${{ github.repository_owner }}/hummingbot-api:latest

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env pull

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env up -d

            sleep 15

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env ps

            if ! curl -sfS --max-time 10 http://127.0.0.1:8000/openapi.json >/dev/null; then
              echo "ERROR: Hummingbot API did not respond on /openapi.json after deploy"
              docker compose -f docker-compose.prod.yml --env-file ../.secrets/env logs --tail 80
              exit 1
            fi

            echo "Deploy complete — Hummingbot API is up"
