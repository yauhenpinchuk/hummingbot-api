# Optional prod config sync: set repo secret HUMMINGBOT_STACK_OPS_TOKEN (fine-grained or classic PAT
# with read access to private hummingbot-stack-ops). Optional HUMMINGBOT_STACK_OPS_REPOSITORY if the
# ops repo is not {repository_owner}/hummingbot-stack-ops.
name: Build and Deploy — Hummingbot API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  scan-secrets:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.sha }}
          head: HEAD
          extra_args: --only-verified

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [scan-secrets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hummingbot-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hummingbot-api:latest
            ghcr.io/${{ github.repository_owner }}/hummingbot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    env:
      # GitHub rejects `secrets.*` inside step `if:` (parse error). Use env for presence checks only.
      _STACK_OPS_TOKEN: ${{ secrets.HUMMINGBOT_STACK_OPS_TOKEN }}
      _STACK_OPS_REPO_FULL: ${{ secrets.HUMMINGBOT_STACK_OPS_REPOSITORY != '' && secrets.HUMMINGBOT_STACK_OPS_REPOSITORY || format('{0}/hummingbot-stack-ops', github.repository_owner) }}

    steps:
      - name: Checkout (for optional stack-ops sync)
        uses: actions/checkout@v4

      - name: Checkout hummingbot-stack-ops (prod configs)
        id: stack_ops
        if: ${{ env._STACK_OPS_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env._STACK_OPS_REPO_FULL }}
          token: ${{ secrets.HUMMINGBOT_STACK_OPS_TOKEN }}
          path: hummingbot-stack-ops

      - name: Rsync prod bot configs (runner → server)
        if: ${{ steps.stack_ops.outcome == 'success' }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          RSYNC_SSH="ssh -i ${HOME}/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          rsync -az -e "$RSYNC_SSH" \
            hummingbot-stack-ops/prod/bots/credentials/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/hummingbot-stack/hummingbot-api/bots/credentials/"
          rsync -az -e "$RSYNC_SSH" \
            hummingbot-stack-ops/prod/bots/conf/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/hummingbot-stack/hummingbot-api/bots/conf/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/hummingbot-stack/hummingbot-api

            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export HUMMINGBOT_API_IMAGE=ghcr.io/${{ github.repository_owner }}/hummingbot-api:latest
            # Default host path for bot bind mounts (override in ../.secrets/env if repo lives elsewhere)
            export DOCKER_HOST_PROJECT_ROOT="${DOCKER_HOST_PROJECT_ROOT:-/opt/hummingbot-stack/hummingbot-api}"

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env pull

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env up -d

            # Idempotent: create hummingbot_sol_pump if Postgres volume predates init-db.sql (new installs get it from init)
            COMPOSE_FILE=docker-compose.prod.yml ENV_FILE=../.secrets/env ./scripts/ensure-hummingbot-trading-db.sh

            sleep 15

            docker compose -f docker-compose.prod.yml --env-file ../.secrets/env ps

            if ! curl -sfS --max-time 10 http://127.0.0.1:8000/openapi.json >/dev/null; then
              echo "ERROR: Hummingbot API did not respond on /openapi.json after deploy"
              docker compose -f docker-compose.prod.yml --env-file ../.secrets/env logs --tail 80
              exit 1
            fi

            # Optional: start Gateway through the API (API-only operations model).
            # Set in ../.secrets/env: GATEWAY_POST_START=true and HUMMINGBOT_GATEWAY_IMAGE=ghcr.io/<owner>/hummingbot-gateway:latest
            set -a
            . ../.secrets/env
            set +a
            if [ "${GATEWAY_POST_START:-false}" = "true" ] && [ -n "${HUMMINGBOT_GATEWAY_IMAGE:-}" ] && [ -n "${GATEWAY_PASSPHRASE:-}" ]; then
              echo "Starting Gateway via API..."
              BODY=$(python3 -c "import json,os; print(json.dumps({'passphrase':os.environ['GATEWAY_PASSPHRASE'],'image':os.environ['HUMMINGBOT_GATEWAY_IMAGE'],'dev_mode':True}))")
              curl -sfS --max-time 120 -u "${USERNAME}:${PASSWORD}" -X POST http://127.0.0.1:8000/gateway/start \
                -H 'Content-Type: application/json' -d "$BODY"
              echo ""
              sleep 5
              curl -sfS --max-time 10 http://127.0.0.1:15888/connectors >/dev/null && echo "Gateway responded on :15888" || echo "WARN: Gateway not yet reachable on :15888 (check logs / firewall)"
            fi

            echo "Deploy complete — Hummingbot API is up"
