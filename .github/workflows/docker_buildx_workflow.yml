# Optional: publish multi-arch images to Docker Hub (upstream-style).
# Forks rarely have DOCKERHUB_* secrets; production deploy uses GHCR via deploy.yml instead.
name: Hummingbot-API Docker Hub (manual)

on:
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      # secrets.* is not allowed in job or step `if:` — use env for guards (same pattern as deploy.yml).
      _DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      _DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Skip when Docker Hub secrets unset
        if: ${{ env._DOCKERHUB_USER == '' || env._DOCKERHUB_TOKEN == '' }}
        run: echo '::notice::Skipping — set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets to publish.'

      - name: Checkout code
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        uses: actions/checkout@v4.1.1

      - name: Extract version from main.py
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        id: get_version
        run: |
          VERSION=$(grep -E '^VERSION *= *' main.py | head -1 | sed -E 's/^VERSION *= *["\x27]?([^"\x27]*)["\x27]?/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v3.1.0

      - name: Login to DockerHub
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images (latest and versioned)
        if: ${{ env._DOCKERHUB_USER != '' && env._DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            hummingbot/hummingbot-api:latest
            hummingbot/hummingbot-api:${{ steps.get_version.outputs.VERSION }}
