# Optional: publish multi-arch images to Docker Hub (upstream-style).
# Forks rarely have DOCKERHUB_* secrets; production deploy uses GHCR via deploy.yml instead.
name: Hummingbot-API Docker Hub (manual)

on:
  workflow_dispatch:

jobs:
  build_and_push:
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Extract version from main.py
        id: get_version
        run: |
          VERSION=$(grep -E '^VERSION *= *' main.py | head -1 | sed -E 's/^VERSION *= *["\x27]?([^"\x27]*)["\x27]?/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.1.0

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images (latest and versioned)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            hummingbot/hummingbot-api:latest
            hummingbot/hummingbot-api:${{ steps.get_version.outputs.VERSION }}
