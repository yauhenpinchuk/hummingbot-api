# Local / dev stack. Project name fixes the bridge network to `hummingbot-api_emqx-bridge`
# (Gateway containers started by the API look for this network on macOS/Windows.)
name: hummingbot-api

services:
  hummingbot-api:
    container_name: hummingbot_api
    image: hummingbot/hummingbot-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount only mutable trees so image-baked bots/conf, bots/scripts, bots/controllers stay visible
      - ./bots/credentials:/hummingbot-api/bots/credentials
      - ./bots/instances:/hummingbot-api/bots/instances
      - ./bots/data:/hummingbot-api/bots/data
      - ./bots/archived:/hummingbot-api/bots/archived
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - path: .env
        required: false
    environment:
      # Override specific values for Docker networking
      - BROKER_HOST=emqx
      - DATABASE_URL=postgresql+asyncpg://hbot:hummingbot-api@postgres:5432/hummingbot_api
      - GATEWAY_URL=http://host.docker.internal:15888
    extra_hosts:
      # Map host.docker.internal to host gateway for Linux compatibility
      # On macOS/Windows, Docker Desktop provides this automatically
      # On Linux, this maps to the docker bridge gateway IP
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
  emqx:
    container_name: hummingbot-api-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"  # mqtt:tcp
      - "8883:8883"  # mqtt:tcp:ssl
      - "8083:8083"  # mqtt:ws
      - "8084:8084"  # mqtt:ws:ssl
      - "8081:8081"  # http:management
      - "18083:18083"  # http:dashboard
      - "61613:61613"  # web-stomp gateway
    networks:
      emqx-bridge:
        aliases:
          - node1.emqx.local
    healthcheck:
      test: [ "CMD", "/opt/emqx/bin/emqx_ctl", "status" ]
      interval: 5s
      timeout: 25s
      retries: 5
  postgres:
    container_name: hummingbot_api_postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      # These variables automatically create the user and database on first initialization
      - POSTGRES_DB=hummingbot_api
      - POSTGRES_USER=hbot
      - POSTGRES_PASSWORD=hummingbot-api
      # Additional init parameters for better compatibility
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init script as safety net - only runs on first initialization
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    # Host port 55432 avoids clashing with other Postgres (e.g. crypto-analytics on 5432)
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  emqx-data: { }
  emqx-log: { }
  emqx-etc: { }
  postgres-data: { }
