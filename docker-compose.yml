# Local / dev stack. Project name fixes the bridge network to `hummingbot-api_emqx-bridge`
# (Gateway containers started by the API look for this network on macOS/Windows.)
name: hummingbot-api

services:
  hummingbot-api:
    container_name: hummingbot_api
    # Local build tag (not Docker Hub `hummingbot/*` — avoids accidental pull of upstream API image)
    image: local/hummingbot-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # credentials/conf: default ./bots/... in this repo, or set HUMMINGBOT_BOTS_*_MOUNT to
      # hummingbot-stack-ops dev paths (absolute) — see .env.example
      - ${HUMMINGBOT_BOTS_CREDENTIALS_MOUNT:-./bots/credentials}:/hummingbot-api/bots/credentials
      - ${HUMMINGBOT_BOTS_CONF_MOUNT:-./bots/conf}:/hummingbot-api/bots/conf
      - ./bots/instances:/hummingbot-api/bots/instances
      - ./bots/data:/hummingbot-api/bots/data
      - ./bots/archived:/hummingbot-api/bots/archived
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - path: .env
        required: false
    environment:
      # BROKER_HOST must be the Docker service name (not localhost)
      - BROKER_HOST=emqx
      # Prefer `DATABASE_URL` from `.env`; fallback matches default POSTGRES_PASSWORD below
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hbot:hummingbot-api@postgres:5432/hummingbot_api}
      # Host absolute path to this repo (Linux + docker.sock). Set in `.env` / `.secrets/env`.
      - DOCKER_HOST_PROJECT_ROOT=${DOCKER_HOST_PROJECT_ROOT:-}
    extra_hosts:
      # Map host.docker.internal to host gateway for Linux compatibility
      # On macOS/Windows, Docker Desktop provides this automatically
      # On Linux, this maps to the docker bridge gateway IP
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
  emqx:
    container_name: hummingbot-api-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"  # mqtt:tcp
      - "8883:8883"  # mqtt:tcp:ssl
      - "8083:8083"  # mqtt:ws
      - "8084:8084"  # mqtt:ws:ssl
      - "8081:8081"  # http:management
      - "18083:18083"  # http:dashboard
      - "61613:61613"  # web-stomp gateway
    networks:
      emqx-bridge:
        aliases:
          - node1.emqx.local
    healthcheck:
      test: [ "CMD", "/opt/emqx/bin/emqx_ctl", "status" ]
      interval: 5s
      timeout: 25s
      retries: 5
  postgres:
    container_name: hummingbot_api_postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      # Values from project `.env` (Compose substitution); defaults if `.env` missing
      - POSTGRES_DB=${POSTGRES_DB:-hummingbot_api}
      - POSTGRES_USER=${POSTGRES_USER:-hbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hummingbot-api}
      # Additional init parameters for better compatibility
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init script as safety net - only runs on first initialization
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    # Host port 55432 avoids clashing with other Postgres (e.g. crypto-analytics on 5432).
    # Second DB `hummingbot_sol_pump` (native Hummingbot MarketsRecorder, sol-pump): see init-db.sql; existing volumes:
    #   ./scripts/ensure-hummingbot-trading-db.sh
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  emqx-data: { }
  emqx-log: { }
  emqx-etc: { }
  postgres-data: { }
