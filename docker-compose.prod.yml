# Production Docker Compose — Hummingbot API
#
# Images are built by .github/workflows/deploy.yml and pushed to GHCR.
# Do not add build: sections here.
#
# PostgreSQL is a dedicated instance for hummingbot-api only. Host port 55432 avoids
# conflict with crypto-analytics or other Postgres on 127.0.0.1:5432.
#
# Secrets: /opt/hummingbot-stack/.secrets/env (chmod 600). Create from .env.example.
#
# Layout (same server root as hummingbot + gateway):
#   /opt/hummingbot-stack/
#     hummingbot-api/   ← this repo
#     .secrets/env
#
# Deploy (CI runs this after SSH):
#   export HUMMINGBOT_API_IMAGE=ghcr.io/<owner>/hummingbot-api:latest
#   docker compose -f docker-compose.prod.yml --env-file ../.secrets/env pull
#   docker compose -f docker-compose.prod.yml --env-file ../.secrets/env up -d

name: hummingbot-api

services:
  hummingbot-api:
    image: ${HUMMINGBOT_API_IMAGE}
    container_name: hummingbot_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Bind-mount only mutable trees so image-baked bots/conf (incl. sol-pump YAML) stays visible
      - ./bots/credentials:/hummingbot-api/bots/credentials
      - ./bots/instances:/hummingbot-api/bots/instances
      - ./bots/data:/hummingbot-api/bots/data
      - ./bots/archived:/hummingbot-api/bots/archived
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - BROKER_HOST=emqx
      - BROKER_PORT=1883
      - BROKER_USERNAME=${BROKER_USERNAME}
      - BROKER_PASSWORD=${BROKER_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - CONFIG_PASSWORD=${CONFIG_PASSWORD}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - GATEWAY_URL=${GATEWAY_URL:-http://host.docker.internal:15888}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy

  emqx:
    container_name: hummingbot-api-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS=emqx_recon,emqx_retainer,emqx_management,emqx_dashboard
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:18083:18083"
    networks:
      emqx-bridge:
        aliases:
          - node1.emqx.local
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5

  postgres:
    container_name: hummingbot_api_postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  emqx-data: {}
  emqx-log: {}
  emqx-etc: {}
  postgres-data: {}
